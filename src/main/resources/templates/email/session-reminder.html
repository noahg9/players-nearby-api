<!DOCTYPE html>
<html th:replace="~{email/_layout :: emailLayout('Starting in 1 hour', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<section>
  <p style="margin:0 0 16px">Your session starts in about 1&nbsp;hour:</p>
  <table cellpadding="0" cellspacing="0" style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:16px 20px;margin:0 0 20px;width:100%;">
    <tr><td style="font-weight:700;font-size:16px;color:#111827;padding-bottom:6px;" th:text="${sessionTitle}">Session title</td></tr>
    <tr><td style="color:#6b7280;font-size:14px;">&#128205; <span th:text="${locationName}">Location</span></td></tr>
    <tr><td style="color:#6b7280;font-size:14px;padding-top:4px;">&#128336; <span th:text="${formattedTime}">Time</span></td></tr>
  </table>
  <a th:href="${sessionUrl}"
     style="display:inline-block;padding:12px 24px;background:#16a34a;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:600;font-size:15px">
    View session
  </a>
</section>
</body>
</html>
